name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Test against the current LTS and the latest stable release
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Exchanges your service account key for a short-lived OAuth access token
      # scoped to drive.appdata. The key is stored as a repo/org secret and
      # never appears in logs. See "Setting up CI" in the README for details.
      - name: Authenticate with Google
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          token_format: access_token
          scopes: https://www.googleapis.com/auth/drive.appdata

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          GOOGLE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}

      # Upload the lcov report produced by vitest to Codecov.
      # Only runs on Node 20 to avoid duplicate uploads from the matrix.
      - name: Upload coverage to Codecov
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
